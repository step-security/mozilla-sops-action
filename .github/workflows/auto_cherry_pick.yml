name: Auto Cherry-Pick from Upstream

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled

  workflow_dispatch:
    inputs:
      base_branch:
        description: 'Base branch to create the PR against'
        required: true
        default: 'main'
      script:
        description: 'Script to run after audit fix'
        required: false
        default: 'npm run publish'
      mode:
        description: "Run mode: cherry-pick or verify"
        required: false
        default: "cherry-pick"
      node_version:
        description: "Node.js version to use"
        required: false
        default: "24"

permissions:
  contents: write
  pull-requests: write
  packages: read
  issues: write

jobs:
  cherry-pick:
    if: github.event_name == 'workflow_dispatch' || contains(fromJson(toJson(github.event.pull_request.labels)).*.name, 'review-required')
    uses: step-security/reusable-workflows/.github/workflows/auto_cherry_pick.yaml@v1
    with:
      original-owner: 'mdgreenwald'
      repo-name: 'mozilla-sops-action'
      base_branch: ${{ inputs.base_branch }}
      script: ${{ inputs.script || 'npm run publish' }}
      mode: ${{ github.event_name == 'pull_request' && 'verify' || inputs.mode }}
      node_version: ${{ inputs.node_version || '24' }}

